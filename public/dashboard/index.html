<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ShipFast Docs</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Top nav -->
  <nav class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
    <div class="flex items-center space-x-2">
      <span class="text-2xl">⚡</span>
      <span class="font-bold text-xl">ShipFast Docs</span>
    </div>
    <div class="flex items-center space-x-4">
      <span class="text-gray-500 text-sm">Dashboard</span>
      <div class="flex items-center space-x-2">
        <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center text-white text-sm font-bold">I</div>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold">Your Documents</h1>
        <p class="text-gray-500 text-sm">Manage your docs and get embed snippets</p>
      </div>
      <button onclick="showUploadModal()" class="gradient-bg text-white px-4 py-2 rounded-lg font-semibold hover:opacity-90">+ Add Document</button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl p-4 shadow">
        <div class="text-gray-500 text-sm">Documents</div>
        <div class="text-2xl font-bold" id="stat-docs">0</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow">
        <div class="text-gray-500 text-sm">Chats this month</div>
        <div class="text-2xl font-bold" id="stat-chats">0</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow">
        <div class="text-gray-500 text-sm">Plan</div>
        <div class="text-2xl font-bold gradient-text" id="stat-plan">Free</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow">
        <div class="text-gray-500 text-sm">API Key</div>
        <div class="text-xs font-mono text-gray-400 truncate" id="stat-apikey">Not set</div>
      </div>
    </div>

    <!-- Documents list -->
    <div class="bg-white rounded-xl shadow">
      <div class="px-6 py-4 border-b">
        <h2 class="font-semibold">All Documents</h2>
      </div>
      <div id="docs-list" class="divide-y">
        <div class="px-6 py-8 text-center text-gray-400">
          <div class="text-4xl mb-2">📄</div>
          <p>No documents yet</p>
          <p class="text-sm">Add your first document to get started</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div id="upload-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-full max-w-lg">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg">Add Document</h3>
        <button onclick="hideUploadModal()" class="text-gray-400 hover:text-gray-600">✕</button>
      </div>
      <form id="upload-form" onsubmit="return false;">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text" id="doc-title" placeholder="My Docs" class="w-full px-3 py-2 border rounded-lg">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">URL (optional)</label>
            <input type="url" id="doc-url" placeholder="https://..." class="w-full px-3 py-2 border rounded-lg">
          </div>
          <div class="text-center text-gray-400 text-sm">or paste content directly in API</div>
          <button type="button" onclick="uploadDoc()" class="w-full gradient-bg text-white py-2 rounded-lg font-semibold">Add Document</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let apiKey = localStorage.getItem('sfd_api_key') || prompt('Enter your API key:');

    if (apiKey) {
      localStorage.setItem('sfd_api_key', apiKey);
      loadDocs();
      loadStats();
    }

    async function loadDocs() {
      try {
        const res = await fetch(API_BASE + '/api/v1/docs', {
          headers: { 'Authorization': 'Bearer ' + apiKey }
        });
        if (!res.ok) throw new Error('Failed to load docs');
        const data = await res.json();
        renderDocs(data.documents || []);
      } catch (err) {
        console.error(err);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch(API_BASE + '/api/v1/plans', {
          headers: { 'Authorization': 'Bearer ' + apiKey }
        });
      } catch(err) {}
      document.getElementById('stat-apikey').textContent = apiKey ? apiKey.slice(0, 20) + '...' : 'Not set';
    }

    function renderDocs(docs) {
      const list = document.getElementById('docs-list');
      document.getElementById('stat-docs').textContent = docs.length;

      if (docs.length === 0) {
        list.innerHTML = '<div class="px-6 py-8 text-center text-gray-400"><div class="text-4xl mb-2">📄</div><p>No documents yet</p></div>';
        return;
      }

      list.innerHTML = docs.map(doc => `
        <div class="px-6 py-4 flex items-center justify-between hover:bg-gray-50">
          <div class="flex-1">
            <div class="font-medium">${doc.title}</div>
            <div class="text-sm text-gray-500">${doc.chunk_count || 0} chunks · ${doc.status}</div>
          </div>
          <div class="flex items-center space-x-3">
            <code class="text-xs bg-gray-100 px-2 py-1 rounded">/api/v1/embed/${doc.id}.js</code>
            <button onclick="deleteDoc('${doc.id}')" class="text-red-500 text-sm hover:underline">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function uploadDoc() {
      const title = document.getElementById('doc-title').value;
      const url = document.getElementById('doc-url').value;

      if (!title && !url) {
        alert('Please provide a title or URL');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/api/v1/docs', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify({ title, url })
        });

        if (!res.ok) throw new Error('Upload failed');
        hideUploadModal();
        loadDocs();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function deleteDoc(id) {
      if (!confirm('Delete this document?')) return;
      await fetch(API_BASE + '/api/v1/docs/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + apiKey }
      });
      loadDocs();
    }

    function showUploadModal() {
      document.getElementById('upload-modal').classList.remove('hidden');
      document.getElementById('upload-modal').classList.add('flex');
    }

    function hideUploadModal() {
      document.getElementById('upload-modal').classList.add('hidden');
      document.getElementById('upload-modal').classList.remove('flex');
    }
  </script>
</body>
</html>
